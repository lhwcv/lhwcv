name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 生成 SVG 卡片
      - name: Generate stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装专业 SVG 转换工具
      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      # 转换为高清 PNG（绝对不报错）
      - name: Convert SVG to PNG
        run: |
          rsvg-convert profile/stats.svg \
            --format=png \
            --width=500 \
            --output=profile/stats.png

      # 提交并推送
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add profile/*.png
          git commit -m "Update stats PNG" || exit 0
          git push
