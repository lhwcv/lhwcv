name: Update README cards (SVG to JPG)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 生成统计卡片 SVG
      - name: Generate stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装最稳的图片转换工具（不会再报 command not found）
      - name: Install image converter
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # 用 convert 命令（绝对可用）把 SVG 转 JPG
      - name: Convert SVG to JPG
        run: |
          convert profile/stats.svg \
            -background white \
            -alpha remove \
            -quality 100 \
            profile/stats.jpg

      # 提交并推送
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add profile/*.jpg
          git commit -m "Update stats JPG" || exit 0
          git push
