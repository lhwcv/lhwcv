name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 1. 生成 SVG 卡片
      - name: Generate stats SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 安装专业 SVG 渲染工具（不会报错！）
      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      # 3. 用 rsvg-convert 转 JPG（完美渲染，无任何报错）
      - name: Convert SVG to JPG
        run: |
          rsvg-convert profile/stats.svg \
            --format=jpg \
            --background-color=white \
            --width=500 \
            --output=profile/stats.jpg

      # 4. 提交图片
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add profile/*.jpg
          git commit -m "Update stats JPG" || exit 0
          git push
