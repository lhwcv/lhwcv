name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"  # UTC 0点 = 北京时间 8点，每天自动更新
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all  # 给足写权限，避免push失败
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate stats SVG card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs SVG card (可选，不需要可删除)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert SVG to high-quality JPG
        run: |
          # 安装ImageMagick（ubuntu-latest默认已装，保险起见再装一次）
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # 转换stats.svg为stats.jpg，设置高质量、白色背景、300DPI
          magick convert -density 300 profile/stats.svg -background white -alpha remove -quality 95 profile/stats.jpg
          
          # 转换top-langs.svg为top-langs.jpg（不需要可删除这行）
          magick convert -density 300 profile/top-langs.svg -background white -alpha remove -quality 95 profile/top-langs.jpg

      - name: Commit and push updated JPG cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add profile/*.jpg
          git commit -m "🔄 Auto-update README stats cards (JPG format)" || exit 0
          git push

